<div class="app-shell">

  <!-- ── Sidebar ── -->
  <aside class="sidebar" [class.collapsed]="!sidebarOpen()">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <span class="brand-name">DataHub</span>
      </div>
      <button class="toggle-btn" (click)="toggleSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Menú</div>
      <ul>
        <li *ngFor="let item of navItems()">
          <a [routerLink]="item.route" routerLinkActive="active"
             [routerLinkActiveOptions]="{exact: item.route === '/app/dashboard'}"
             class="nav-item">
            <span class="nav-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" *ngIf="item.icon === 'grid'">
                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
              </svg>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" *ngIf="item.icon === 'users'">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" *ngIf="item.icon === 'package'">
                <line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/>
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>
              </svg>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" *ngIf="item.icon === 'heart'">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
              </svg>
              <!-- stethoscope / clinical-record icon -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" *ngIf="item.icon === 'stethoscope'">
                <path d="M4.5 2.5C3 4 3 6 4.5 7.5S7 9 7 9v4a5 5 0 0 0 10 0v-1a3 3 0 1 0-2 0v1a3 3 0 0 1-6 0V9s1-.5 2.5-1.5S13 4 11.5 2.5"/>
                <circle cx="17" cy="16" r="1" fill="currentColor"/>
              </svg>
              <!-- clipboard / medical records icon -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" *ngIf="item.icon === 'clipboard'">
                <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
                <rect x="9" y="3" width="6" height="4" rx="1" ry="1"/>
                <line x1="9" y1="12" x2="15" y2="12"/>
                <line x1="9" y1="16" x2="13" y2="16"/>
              </svg>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" *ngIf="item.icon === 'calendar'">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              <!-- brain / psychology icon -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" *ngIf="item.icon === 'brain'">
                <path d="M9.5 2a2.5 2.5 0 0 1 5 0 2.5 2.5 0 0 1 2.45 2 2.5 2.5 0 0 1 .05 4.95A5 5 0 0 1 12 14a5 5 0 0 1-5-4.95 2.5 2.5 0 0 1-.5-4.9A2.5 2.5 0 0 1 9.5 2z"/>
                <path d="M12 14v3m-4 4h8m-4-4v1"/>
                <path d="M9.5 7c0 1 .5 2 2.5 2s2.5-1 2.5-2"/>
              </svg>
              <!-- tooth / dental icon -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" *ngIf="item.icon === 'tooth'">
                <path d="M12 2c-2.5 0-4 1.5-4 3 0 1 .4 1.8 1 2.5C8.4 8.5 8 9.7 8 11c0 3 1 7 2.5 9a1.5 1.5 0 0 0 3 0C15 18 16 14 16 11c0-1.3-.4-2.5-1-3.5.6-.7 1-1.5 1-2.5 0-1.5-1.5-3-4-3z"/>
              </svg>
              <!-- chat icon -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" *ngIf="item.icon === 'chat'">
                <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
              </svg>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                *ngIf="item.icon !== 'grid' && item.icon !== 'users' && item.icon !== 'package' && item.icon !== 'heart' && item.icon !== 'calendar' && item.icon !== 'stethoscope' && item.icon !== 'clipboard' && item.icon !== 'brain' && item.icon !== 'tooth' && item.icon !== 'chat'">
                <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
                <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
              </svg>
            </span>
            <span class="nav-label">{{ item.label }}</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- User info + logout -->
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">{{ auth.user()?.avatar ?? '?' }}</div>
        <div class="user-details">
          <span class="user-name">{{ auth.user()?.name ?? '' }}</span>
          <span class="user-role">{{ auth.user()?.role ?? '' }}</span>
        </div>
      </div>
      <button class="logout-btn" (click)="logout()" title="Cerrar sesión">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- ── Main content ── -->
  <div class="main-wrapper">
    <header class="top-bar">
      <button class="mobile-toggle" (click)="toggleSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="top-bar-actions">
        <span class="role-badge" *ngIf="auth.user()">{{ auth.user()!.role }}</span>
        <div class="divider"></div>
        <div class="top-user">
          <div class="top-user-avatar">{{ auth.user()?.avatar ?? '?' }}</div>
          <span>{{ getUserFirstName() }}</span>
        </div>
        <button class="icon-btn logout-icon" (click)="logout()" title="Cerrar sesión">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="page-content">
      <router-outlet/>
    </main>
  </div>
</div>
